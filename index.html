<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Logowanie mObywatel</title>
<style>
  body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #0d0d0d;
    color: #fff;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100vh;
  }

  .container {
    width: 90%;
    max-width: 400px;
    padding: 20px;
    background: rgba(0, 0, 0, 0.7);
    border-radius: 10px;
    box-shadow: 0 0 10px rgba(0,0,0,0.5);
  }

  .header {
    display: flex;
    align-items: center;
    margin-bottom: 10px;
  }

  .logo {
    width: 40px;
    height: 40px;
    margin-right: 10px;
  }

  h1 {
    margin: 0;
    font-size: 20px;
  }

  p {
    margin-top: 0;
    margin-bottom: 20px;
    font-size: 14px;
  }

  .input-group {
    margin-bottom: 15px;
    position: relative;
  }

  input[type="password"] {
    width: 100%;
    padding: 10px 40px 10px 10px;
    border: 1px solid #ccc;
    border-radius: 5px;
    background-color: #222;
    color: #fff;
  }

  .eye-icon {
    position: absolute;
    right: 10px;
    top: 50%;
    transform: translateY(-50%);
    cursor: pointer;
  }

  .links {
    font-size: 12px;
    color: #0097e6;
    margin-bottom: 20px;
    text-align: right;
  }

  .buttons {
    display: flex;
    flex-direction: column;
  }

  .btn {
    padding: 12px;
    border: none;
    border-radius: 5px;
    margin-bottom: 10px;
    font-size: 14px;
    cursor: pointer;
  }

  .btn-primary {
    background-color: #4a90e2;
    color: #fff;
  }

  .footer {
    margin-top: 15px;
    font-size: 10px;
    color: #bbb;
    display: flex;
    flex-direction: column;
    align-items: center;
  }

  .footer img {
    margin: 2px 0;
  }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/1/12/Coat_of_Arms_of_Poland.svg/1200px-Coat_of_Arms_of_Poland.svg.png" alt="Polish Coat of Arms" class="logo" />
    <h1>mObywatel</h1>
  </div>
  <p>Dzień dobry!<br/>Zaloguj się do aplikacji.</p>
  <div class="input-group">
    <label for="haslo">Hasło</label>
    <input type="password" id="haslo" placeholder="Hasło" />
    <div class="eye-icon">👁️</div>
  </div>
  <div class="links">
    <a href="#">Nie pamiętasz hasła?</a>
  </div>
  <div class="buttons">
    <button class="btn btn-primary">Uwierzytelnianie…</button>
    <button class="btn btn-primary">Zaloguj się</button>
  </div>
  <div class="footer">
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/0/0b/Ministry_of_Digital_Poland.svg/1200px-Ministry_of_Digital_Poland.svg.png" alt="Ministerstwo Cyfryzacji" width="80" />
    <img src="https://upload.wikimedia.org/wikipedia/commons/9/9a/Logo_KPRM.svg" alt="Krajowy Plan Odbudowy" width="80" />
    <img src="https://upload.wikimedia.org/wikipedia/commons/thumb/2/2d/European_Union_Logo.svg/1200px-European_Union_Logo.svg.png" alt="UE" width="80" />
    <div>wersja 4.73.2 (5559)</div>
  </div>
</div>

</body>
</html>
